<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Steward · 小蜗管家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* =========================================================
       品牌配色 — 苔藓庭院
       Seed: oklch(0.400 0.106 150.0)
       Restrained · warm tinted surface
       ========================================================= */
    :root {
      --bg: oklch(0.97 0.012 75);
      --bg-pattern: oklch(0.93 0.012 75 / 0.35);
      --surface: oklch(0.935 0.016 75);
      --surface-hover: oklch(0.91 0.018 75);
      --border: oklch(0.87 0.012 75);
      --border-light: oklch(0.91 0.01 75);

      --primary: oklch(0.42 0.106 145);
      --primary-hover: oklch(0.38 0.106 145);
      --primary-ghost: oklch(0.91 0.04 135);
      --primary-ghost-hover: oklch(0.88 0.05 135);
      --primary-border: oklch(0.42 0.106 145 / 0.15);

      --accent: oklch(0.62 0.14 42);
      --accent-hover: oklch(0.57 0.14 42);
      --accent-surface: oklch(0.93 0.04 42);
      --accent-border: oklch(0.62 0.14 42 / 0.2);

      --ink: oklch(0.15 0.008 55);
      --muted: oklch(0.53 0.008 55);
      --subtle: oklch(0.72 0.006 55);

      --green: oklch(0.50 0.12 140);
      --green-bg: oklch(0.91 0.045 140);
      --red: oklch(0.52 0.16 30);
      --red-bg: oklch(0.92 0.045 30);
      --amber: oklch(0.62 0.14 80);
      --amber-bg: oklch(0.93 0.04 80);

      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --radius-full: 999px;

      --shadow-sm: 0 1px 4px oklch(0 0 0 / 0.04);
      --shadow-card: 0 2px 12px oklch(0 0 0 / 0.05), 0 1px 3px oklch(0 0 0 / 0.03);
      --shadow-card-hover: 0 8px 28px oklch(0 0 0 / 0.07), 0 2px 6px oklch(0 0 0 / 0.04);
      --shadow-elevated: 0 16px 48px oklch(0 0 0 / 0.09), 0 4px 12px oklch(0 0 0 / 0.05);
    }

    * { box-sizing: border-box; }
    ::selection { background: oklch(0.85 0.08 135); color: var(--ink); }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, var(--bg-pattern) 0.8px, transparent 0.8px);
      background-size: 20px 20px;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ===== SVG Icons base ===== */
    .icon { width: 20px; height: 20px; display: inline-block; vertical-align: middle; flex-shrink: 0; }
    .icon-sm { width: 16px; height: 16px; }
    .icon-lg { width: 24px; height: 24px; }
    .icon-xl { width: 28px; height: 28px; }

    /* ===== Layout ===== */
    .app-wrap { max-width: 1120px; margin: 0 auto; padding: 24px 20px; }

    /* ===== Greeting ===== */
    .greeting {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s ease;
    }
    .greeting::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 10% 60%, oklch(0.42 0.106 145 / 0.04), transparent 70%),
        radial-gradient(ellipse 60% 70% at 90% 30%, oklch(0.62 0.14 42 / 0.03), transparent 60%);
      pointer-events: none;
    }
    .greeting::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2.5px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
      opacity: 0.4;
    }
    .greeting:hover { box-shadow: var(--shadow-card-hover); }
    .greeting-text { font-size: 1.35rem; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; }
    .greeting-sub { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
    .weather-badge {
      background: var(--primary-ghost);
      color: var(--primary);
      padding: 5px 14px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .diary-jump {
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .diary-jump:hover { color: var(--primary); }

    /* ===== Section ===== */
    .section { margin-top: 22px; }
    .section-head {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    /* ===== Room Tabs ===== */
    .room-strip {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .room-chip {
      padding: 7px 16px;
      border-radius: var(--radius-full);
      font-size: 0.8rem;
      font-weight: 500;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .room-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-ghost);
    }
    .room-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ===== Device Cards ===== */
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .device-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      padding: 18px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid var(--border-light);
      position: relative;
    }
    .device-card:hover {
      box-shadow: var(--shadow-card-hover);
      border-color: var(--border);
      transform: translateY(-2px);
    }
    .device-card:active { transform: translateY(0); }
    .device-card.off { opacity: 0.7; }
    .device-card.off:hover { opacity: 1; }
    .device-card .dc-icon { color: var(--muted); }
    .device-card.on .dc-icon { color: var(--primary); }
    .device-card .dc-name { font-weight: 600; font-size: 0.9rem; color: var(--ink); }
    .device-card .dc-id { font-size: 0.68rem; color: var(--subtle); margin-top: -1px; }
    .device-card .dc-detail { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .device-card.on .dc-detail { color: var(--primary); }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }
    .dot.on { background: var(--green); box-shadow: 0 0 6px oklch(0.50 0.12 140 / 0.35); }
    .dot.off { background: var(--border); }

    .toggle-btn {
      font-size: 0.76rem;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: var(--radius-full);
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .toggle-btn.on {
      background: var(--red-bg);
      color: var(--red);
    }
    .toggle-btn.on:hover { background: oklch(0.88 0.06 30); }
    .toggle-btn.off {
      background: var(--primary-ghost);
      color: var(--primary);
    }
    .toggle-btn.off:hover { background: var(--primary-ghost-hover); }

    /* ===== Scene Grid ===== */
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .scene-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 18px 12px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid var(--border-light);
    }
    .scene-card:hover {
      border-color: var(--accent-border);
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-2px);
    }
    .scene-card:active { transform: translateY(0); }
    .scene-card .sc-icon { color: var(--muted); margin-bottom: 7px; display: block; }
    .scene-card:hover .sc-icon { color: var(--accent); }
    .scene-card .sc-label { font-size: 0.85rem; font-weight: 600; color: var(--ink); display: block; }
    .scene-card .sc-desc { font-size: 0.7rem; color: var(--muted); display: block; margin-top: 2px; }

    /* ===== Command ===== */
    .cmd-box {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 20px 24px 22px;
      transition: box-shadow 0.3s;
    }
    .cmd-box:focus-within { box-shadow: var(--shadow-elevated); }
    .cmd-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      background: var(--bg);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .cmd-row:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-border);
    }
    .cmd-row input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 16px;
      font-size: 0.88rem;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      min-width: 0;
    }
    .cmd-row input::placeholder { color: var(--subtle); }
    .cmd-send {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: calc(var(--radius-md) - 2px);
      padding: 0 22px;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      margin: 4px;
      font-family: inherit;
    }
    .cmd-send:hover { background: var(--primary-hover); }
    .cmd-send:active { transform: scale(0.97); }

    /* 语音按钮 */
    .voice-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--muted);
      border: none;
      min-width: 44px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      font-family: inherit;
      border-radius: var(--radius-full);
    }
    .voice-btn:hover { color: var(--primary); }
    .voice-btn.recording {
      color: var(--red);
      animation: pulse-mic 0.8s ease-in-out infinite;
    }
    .voice-btn.recording::after {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--red-bg);
      opacity: 0.3;
      animation: ripple 1s ease-out infinite;
    }
    .voice-btn:disabled { opacity: 0.4; cursor: not-allowed; color: var(--subtle); }
    @keyframes pulse-mic {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    @keyframes ripple {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(2); opacity: 0; }
    }

    .cmd-feedback {
      margin-top: 10px;
      font-size: 0.82rem;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      display: none;
      align-items: center;
      gap: 6px;
    }
    .cmd-feedback.show { display: flex; }
    .cmd-feedback.ok { background: var(--green-bg); color: var(--green); }
    .cmd-feedback.err { background: var(--red-bg); color: var(--red); }
    .cmd-feedback.busy { background: var(--amber-bg); color: var(--amber); display: flex; }

    .quick-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
    }
    .quick-chip {
      font-size: 0.73rem;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .quick-chip:hover {
      background: var(--primary-ghost);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* ===== Voice Feedback ===== */
    .voice-waves {
      display: none;
      align-items: center;
      gap: 3px;
      height: 24px;
      margin-left: 4px;
    }
    .voice-waves.active { display: inline-flex; }
    .voice-waves span {
      display: block;
      width: 3px;
      background: var(--primary);
      border-radius: 2px;
      animation: wave 0.6s ease-in-out infinite alternate;
    }
    .voice-waves span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .voice-waves span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
    .voice-waves span:nth-child(3) { height: 20px; animation-delay: 0.3s; }
    .voice-waves span:nth-child(4) { height: 12px; animation-delay: 0.45s; }
    .voice-waves span:nth-child(5) { height: 18px; animation-delay: 0.2s; }
    @keyframes wave {
      0% { transform: scaleY(0.5); }
      100% { transform: scaleY(1); }
    }

    /* ===== Comfort Suggestions ===== */
    .comfort-section { margin-top: 18px; }
    .comfort-card {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 14px 16px;
      background: var(--accent-surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--accent-border);
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--ink);
    }
    .comfort-card .cf-icon { color: var(--accent); flex-shrink: 0; }
    .comfort-card .cf-msg { flex: 1; }
    .comfort-card .cf-dismiss {
      cursor: pointer; color: var(--subtle); flex-shrink: 0;
      background: none; border: none; padding: 2px; font-size: 1rem;
    }
    .comfort-card .cf-dismiss:hover { color: var(--ink); }
    .comfort-empty {
      text-align: center; padding: 16px; color: var(--subtle); font-size: 0.82rem;
    }

    /* ===== Reminders ===== */
    .reminder-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .reminder-card .rm-info { flex: 1; min-width: 0; }
    .reminder-card .rm-text {
      font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .reminder-card .rm-cron {
      font-size: 0.7rem; color: var(--subtle); margin-top: 2px;
    }
    .reminder-card .rm-delete {
      cursor: pointer; color: var(--red); background: none; border: none;
      padding: 6px; border-radius: var(--radius-sm); font-size: 0.85rem;
      transition: background 0.15s;
    }
    .reminder-card .rm-delete:hover { background: var(--red-bg); }
    .reminder-empty {
      text-align: center; padding: 16px; color: var(--subtle); font-size: 0.82rem;
    }

    /* ===== Diary ===== */
    .diary-box {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 20px 24px;
    }
    .diary-body {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .diary-line {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      transition: background 0.2s;
      animation: lineIn 0.25s ease;
    }
    .diary-line:hover { background: var(--bg); }
    .diary-line .dl-ts {
      color: var(--subtle);
      font-size: 0.7rem;
      white-space: nowrap;
      min-width: 48px;
      padding-top: 1px;
    }
    .diary-line .dl-icon { flex-shrink: 0; padding-top: 1px; }
    .diary-line .dl-txt { color: var(--ink); flex: 1; min-width: 0; }
    .diary-line .dl-note { color: var(--muted); font-size: 0.73rem; white-space: nowrap; }
    .diary-empty {
      text-align: center;
      color: var(--subtle);
      padding: 36px 0;
      font-size: 0.83rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    @keyframes lineIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Health ===== */
    .health-box {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .health-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
      transition: background 0.2s;
    }
    .health-trigger:hover { background: var(--bg); }
    .health-trigger .chev { transition: transform 0.3s ease; color: var(--muted); }
    .health-trigger.open .chev { transform: rotate(180deg); }
    .health-body { padding: 0 24px 18px; display: none; }
    .health-body.open { display: block; }
    .health-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }
    .health-row .hr-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.8rem;
      color: var(--ink);
    }
    .health-row .hr-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .health-row .hr-dot.good { background: var(--green); }
    .health-row .hr-dot.bad { background: var(--red); }
    .health-row .hr-val { font-size: 0.76rem; color: var(--muted); }

    /* ===== Loading ===== */
    .skeleton {
      background: linear-gradient(90deg,
        var(--surface) 25%,
        oklch(0.96 0.01 75) 50%,
        var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sk-card { height: 96px; border-radius: var(--radius-md); }

    /* ===== Empty / Error ===== */
    .empty-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 36px 16px;
      color: var(--subtle);
    }
    .empty-box .eb-icon { margin-bottom: 8px; }
    .empty-box .eb-text { font-size: 0.84rem; }

    /* ===== Snail signature ===== */
    .snail-sig {
      position: fixed;
      bottom: 10px;
      right: 16px;
      font-size: 0.68rem;
      color: var(--border);
      user-select: none;
      pointer-events: none;
      opacity: 0.5;
      letter-spacing: 0.5px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .app-wrap { padding: 14px 10px; }
      .greeting { padding: 20px; }
      .greeting-text { font-size: 1.1rem; }
      .device-grid { grid-template-columns: 1fr; }
      .scene-grid { grid-template-columns: repeat(2, 1fr); }
      .cmd-box { padding: 14px 16px 16px; }
      .cmd-row { flex-direction: column; }
      .cmd-send { width: 100%; margin: 0 0 4px 0; justify-content: center; padding: 10px; }
      .diary-box { padding: 16px; }
      .health-trigger { padding: 14px 16px; }
      .health-body { padding: 0 16px 14px; }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .device-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

       SVG 图标库

  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <!-- 灯泡（灯） -->
    <symbol id="i-bulb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a6 6 0 0 0-3 11.2A6 6 0 0 0 9 16v1h6v-1a6 6 0 0 0 0-2.8A6 6 0 0 0 12 2Z"/>
      <path d="M9 19h6"/><path d="M10 22h4"/>
    </symbol>
    <!-- 雪花（空调） -->
    <symbol id="i-snow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

  <script>
    // ============================================================
    //  HOME STEWARD
    // ============================================================
    const API = 'http://localhost:8000';
    let currentRoom = 'all';
    let allDevices = [];
    let roomNames = [];
    let healthOpen = false;

    // ---------- Icons ----------
    function icon(name, cls = '') {
      return `<svg class="icon ${cls}"><use href="#i-${name}"/></svg>`;
    }
    function iconSm(name) { return icon(name, 'icon-sm'); }

    // ---------- Greeting ----------
    function setGreeting() {
      const h = new Date().getHours();
      let text, sub;
      if (h >= 5 && h < 12) {
        text = '早上好，主人'; sub = '新的一天，小蜗已经在悄悄工作了 …';
      } else if (h >= 12 && h < 14) {
        text = '中午好，主人'; sub = '午后的阳光正好，家里一切安好 ☕';
      } else if (h >= 14 && h < 18) {
        text = '下午好，主人'; sub = '今天也在慢慢让家变得更舒适 …';
      } else if (h >= 18 && h < 21) {
        text = '傍晚好，主人'; sub = '天色暗了，需要帮你开灯吗？';
      } else {
        text = '晚上好，主人'; sub = '夜深了，小蜗在安静地守护着家 …';
      }
      document.getElementById('greetingText').textContent = text;
      document.getElementById('greetingSub').textContent = sub;
    }
    setGreeting();

    // ---------- Room Detection ----------
    const ROOMS = ['客厅','卧室','厨房','书房','阳台','餐厅','卫生间','浴室','院子','车库','门廊','走廊'];
    function detectRoom(name) {
      for (const r of ROOMS) { if (name.includes(r)) return r; }
      return null;
    }

    const ROOM_ICONS = { '客厅':'sofa', '卧室':'bed', '厨房':'chef', '书房':'book', '阳台':'leaf', '餐厅':'dine' };
    function roomIcon(room) { return ROOM_ICONS[room] || 'house'; }

    function groupByRoom(devices) {
      const groups = {};
      for (const d of devices) {
        const room = detectRoom(d.name) || '其他';
        if (!groups[room]) groups[room] = [];
        groups[room].push(d);
      }
      const order = ['客厅','卧室','厨房','书房','阳台','餐厅','其他'];
      const sorted = {};
      for (const r of order) { if (groups[r]) sorted[r] = groups[r]; }
      for (const r of Object.keys(groups).sort()) { if (!sorted[r]) sorted[r] = groups[r]; }
      return sorted;
    }

    // ---------- Icons per device type ----------
    const DEV_ICONS = {
      light: 'bulb', ac: 'snow', curtain: 'window', plug: 'plug',
      sensor: 'device', fan: 'fan', tv: 'tv', music: 'music'
    };

    // ---------- Device Card ----------
    function deviceCardHTML(device, status) {
      const isOn = status?.on;
      const di = DEV_ICONS[device.type] || 'device';
      let detail = '';
      if (status?.temperature) detail = `${status.temperature}°C`;
      else if (status?.brightness) detail = `${status.brightness}%`;
      else if (status?.humidity) detail = `${status.humidity}%`;

      return `
        <div class="device-card ${isOn ? 'on' : 'off'}" data-device-id="${device.id}">
          <div class="flex items-start justify-between mb-2">
            <div class="flex items-center gap-2.5 min-w-0">
              <span class="dc-icon">${icon(di)}</span>
              <div class="min-w-0">
                <div class="dc-name truncate">${device.name}</div>
                <div class="dc-id truncate">${device.id}</div>
              </div>
            </div>
            <span class="dot ${isOn ? 'on' : 'off'}"></span>
          </div>
          <div class="flex items-center justify-between">
            <span class="dc-detail">
              ${isOn
                ? `<span style="font-weight:500;">已开启</span>`
                : `<span>已关闭</span>`}
              ${detail ? `· ${detail}` : ''}
            </span>
            <button class="toggle-btn ${isOn ? 'on' : 'off'}"
              onclick="event.stopPropagation(); toggleDevice('${device.id}', '${device.name}', ${!isOn})">
              ${isOn ? '关闭' : '打开'}
            </button>
          </div>
        </div>`;
    }

    // ---------- Load Devices ----------
    async function loadDevices() {
      const grid = document.getElementById('deviceGrid');
      try {
        const res = await fetch(`${API}/api/devices/`);
        const data = await res.json();
        allDevices = data.devices || [];

        if (allDevices.length === 0) {
          grid.innerHTML = `<div class="empty-box"><div class="eb-icon">${icon('house','icon-xl')}</div><div class="eb-text">还没有设备，让小蜗帮你发现一些吧 …</div></div>`;
          return;
        }

        const statusResults = await Promise.all(
          allDevices.map(d =>
            fetch(`${API}/api/devices/${d.id}`)
              .then(r => r.json())
              .then(data => ({ id: d.id, status: data.status }))
              .catch(() => ({ id: d.id, status: null })))
        );
        const statusMap = {};
        statusResults.forEach(s => { statusMap[s.id] = s.status; });

        const grouped = groupByRoom(allDevices);
        roomNames = Object.keys(grouped);

        let html = '';
        const list = currentRoom === 'all' ? allDevices : (grouped[currentRoom] || []);
        for (const d of list) html += deviceCardHTML(d, statusMap[d.id]);
        if (!html) html = `<div class="empty-box"><div class="eb-icon">${icon('door','icon-xl')}</div><div class="eb-text">这个房间还没有设备</div></div>`;
        grid.innerHTML = html;

        renderRoomTabs(grouped);
      } catch (e) {
        console.error(e);
        grid.innerHTML = `<div class="empty-box"><div class="eb-icon">${icon('x','icon-xl')}</div><div class="eb-text">小蜗连不上服务器了 … 请检查后端是否在运行</div></div>`;
      }
    }

    function renderRoomTabs(groups) {
      const container = document.getElementById('roomTabs');
      const rooms = Object.keys(groups);
      let html = `<button class="room-chip ${currentRoom==='all'?'active':''}" data-room="all" onclick="switchRoom('all')">${iconSm('house')} 全部</button>`;
      for (const room of rooms) {
        html += `<button class="room-chip ${currentRoom===room?'active':''}" data-room="${room}" onclick="switchRoom('${room}')">${iconSm(roomIcon(room))} ${room}</button>`;
      }
      container.innerHTML = html;
    }

    function switchRoom(room) {
      currentRoom = room;
      loadDevices();
    }

    async function toggleDevice(id, name, turnOn) {
      quickCmd(`${turnOn ? '打开' : '关闭'}${name}`);
    }

    // ---------- Command ----------
    async function sendCommand() {
      const input = document.getElementById('commandInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      await executeCommand(text);
    }

    function quickCmd(text) {
      document.getElementById('commandInput').value = text;
      sendCommand();
    }

    async function executeCommand(text) {
      const fb = document.getElementById('commandFeedback');
      fb.className = 'cmd-feedback busy show';
      fb.innerHTML = `${iconSm('snail')} 小蜗正在努力 …`;

      try {
        const res = await fetch(`${API}/api/devices/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        const result = await res.json();
        fb.className = `cmd-feedback ${result.success ? 'ok' : 'err'} show`;
        fb.innerHTML = `${iconSm(result.success ? 'check' : 'x')} ${result.message}`;
        addDiaryEntry(text, result);
        loadDevices();
        loadHealthIfOpen();
      } catch {
        fb.className = 'cmd-feedback err show';
        fb.innerHTML = `${iconSm('x')} 小蜗连不上服务器了 …`;
        addDiaryEntry(text, { success: false, message: '网络错误' });
      }
    }

    // ---------- Scenes ----------
    const SCENES = [
      { name: '离家模式', icon: 'door',    desc: '关闭所有设备' },
      { name: '回家模式', icon: 'house',   desc: '开客厅灯 40%' },
      { name: '睡眠模式', icon: 'moon',    desc: '关灯·空调睡眠' },
      { name: '早安模式', icon: 'sun',     desc: '渐亮·播报天气' },
    ];
    const SCENE_CMDS = {
      '离家模式': ['关闭客厅灯','关闭卧室灯','关闭厨房灯'],
      '回家模式': ['打开客厅灯'],
      '睡眠模式': ['关闭客厅灯','关闭卧室灯'],
      '早安模式': ['打开卧室灯'],
    };

    function renderScenes() {
      document.getElementById('sceneGrid').innerHTML = SCENES.map(s =>
        `<div class="scene-card" onclick="execScene('${s.name}')">
          <span class="sc-icon">${icon(s.icon, 'icon-lg')}</span>
          <span class="sc-label">${s.name}</span>
          <span class="sc-desc">${s.desc}</span>
        </div>`
      ).join('');
    }
    renderScenes();

    async function execScene(name) {
      const fb = document.getElementById('commandFeedback');
      fb.className = 'cmd-feedback busy show';
      fb.innerHTML = `${iconSm('snail')} 小蜗正在执行 ${name} …`;

      for (const cmd of (SCENE_CMDS[name] || [])) {
        addDiaryEntry(`[${name}] ${cmd}`, { success: true, message: '场景步骤' });
        try {
          await fetch(`${API}/api/devices/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: cmd }),
          });
        } catch {}
      }
      fb.className = 'cmd-feedback ok show';
      fb.innerHTML = `${iconSm('check')} ${name} 执行完成`;
      loadDevices();
      loadHealthIfOpen();
    }

    // ---------- Diary ----------
    function addDiaryEntry(text, result) {
      const panel = document.getElementById('diaryPanel');
      const empty = panel.querySelector('.diary-empty');
      if (empty) empty.remove();

      const entry = document.createElement('div');
      const time = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
      const ok = result && result.success;
      entry.className = 'diary-line';
      entry.innerHTML = `
        <span class="dl-ts">${time}</span>
        <span class="dl-icon">${iconSm(ok ? 'check' : 'x')}</span>
        <span class="dl-txt">${esc(text)}</span>
        <span class="dl-note">${esc(result?.message || '')}</span>`;
      panel.prepend(entry);
      while (panel.children.length > 100) panel.lastChild.remove();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ---------- Health ----------
    function toggleHealth() {
      healthOpen = !healthOpen;
      document.getElementById('healthBody').classList.toggle('open', healthOpen);
      document.getElementById('healthToggle').classList.toggle('open', healthOpen);
      if (healthOpen) loadHealth();
    }

    function loadHealthIfOpen() { if (healthOpen) loadHealth(); }

    async function loadHealth() {
      const panel = document.getElementById('healthPanel');
      try {
        const res = await fetch(`${API}/api/health/detailed`);
        const h = await res.json();
        const items = [
          { label: '后端服务', ok: h.backend?.status === 'running', detail: h.backend?.uptime || '-' },
          { label: 'MQTT',     ok: h.mqtt?.status === 'connected',  detail: `${h.mqtt?.messages || 0} 条` },
          { label: 'AI 模型',  ok: h.llm?.status === 'configured', detail: h.llm?.model || '未部署' },
          { label: '设备',     ok: true,                            detail: `${h.devices?.count || 0} 个` },
          { label: '磁盘',     ok: true,                            detail: `${h.disk?.used || '-'} / ${h.disk?.total || '-'}` },
        ];
        panel.innerHTML = items.map(i => `
          <div class="health-row">
            <div class="hr-label"><span class="hr-dot ${i.ok ? 'good' : 'bad'}"></span>${i.label}</div>
            <span class="hr-val">${i.detail}</span>
          </div>`).join('');
      } catch {
        panel.innerHTML = '<div style="color:var(--red);font-size:0.8rem;padding:4px 0;">⚠️ 无法获取系统状态</div>';
      }
    }

    // ============================================================
    //  WEB SPEECH API — 语音输入
    // ============================================================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      let recognition = null;
      let isRecording = false;
      const voiceBtn = document.getElementById('voiceBtn');

      window.startVoice = function() {
        if (isRecording) return;
        isRecording = true;
        voiceBtn.classList.add('recording');
        document.getElementById('voiceWaves').classList.add('active');
        try {
          recognition = new SpeechRecognition();
          recognition.lang = 'zh-CN';
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.maxAlternatives = 1;
          recognition.onresult = function(e) {
            const text = e.results[0][0].transcript;
            document.getElementById('commandInput').value = text;
            sendCommand();
          };
          recognition.onerror = function(e) {
            if (e.error === 'not-allowed') voiceBtn.title = '请允许麦克风权限';
            stopVoice();
          };
          recognition.onend = function() { stopVoice(); };
          recognition.start();
        } catch(e) { stopVoice(); }
      };
      window.stopVoice = function() {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        document.getElementById('voiceWaves').classList.remove('active');
        if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
      };
    } else {
      document.getElementById('voiceBtn').disabled = true;
      document.getElementById('voiceBtn').title = '语音功能不被当前浏览器支持';
    }

    // ============================================================
    //  COMFORT SUGGESTIONS
    // ============================================================

    async function loadComfort() {
      const panel = document.getElementById('comfortPanel');
      try {
        const res = await fetch(`${API}/api/health/comfort`);
        const data = await res.json();
        const suggestions = data.suggestions || [];
        if (suggestions.length === 0) {
          panel.innerHTML = '<div class="comfort-empty">✨ 一切舒适，小蜗没有需要提醒的</div>';
          return;
        }
        panel.innerHTML = suggestions.map(s => `
          <div class="comfort-card" data-rule="${s.rule_name}">
            <span class="cf-icon">${icon('thermo')}</span>
            <span class="cf-msg">${s.polished_message || s.message}</span>
            <button class="cf-dismiss" onclick="this.parentElement.remove()">✕</button>
          </div>
        `).join('');
      } catch (e) {
        panel.innerHTML = '<div class="comfort-empty">⚠️ 舒适度检测暂不可用</div>';
      }
    }

    // ============================================================
    //  REMINDERS
    // ============================================================

    async function loadReminders() {
      const panel = document.getElementById('reminderPanel');
      try {
        const res = await fetch(`${API}/api/reminders/`);
        const data = await res.json();
        const reminders = data.reminders || [];
        if (reminders.length === 0) {
          panel.innerHTML = '<div class="reminder-empty">📌 还没有提醒，试试输入「每晚10点关灯」</div>';
          return;
        }
        panel.innerHTML = reminders.map(r => `
          <div class="reminder-card" data-id="${r.id}">
            <div class="rm-info">
              <div class="rm-text">${escapeHtml(r.raw_text)}</div>
              <div class="rm-cron">⏰ ${r.cron || '—'}  ·  ${r.created_at || ''}</div>
            </div>
            <button class="rm-delete" onclick="deleteReminder('${r.id}')">删除</button>
          </div>
        `).join('');
      } catch (e) {
        panel.innerHTML = '<div class="reminder-empty">⚠️ 加载提醒失败</div>';
      }
    }

    async function createReminder() {
      const input = document.getElementById('reminderInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      document.getElementById('reminderPanel').innerHTML = '<div class="reminder-empty">⏳ 正在解析 …</div>';
      try {
        const res = await fetch(`${API}/api/reminders/`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text}),
        });
        const data = await res.json();
        if (data.success) {
          await loadReminders();
          showFeedback('reminderPanel', '✅ ' + data.message, 'ok');
        } else {
          showFeedback('reminderPanel', '❌ ' + data.message, 'err');
        }
      } catch (e) {
        showFeedback('reminderPanel', '❌ 创建提醒失败', 'err');
      }
    }

    async function deleteReminder(id) {
      try {
        const res = await fetch(`${API}/api/reminders/${id}`, {method: 'DELETE'});
        if (res.ok) await loadReminders();
      } catch (e) {
        console.error(e);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    //  INIT
    // ============================================================
    loadDevices();
    loadHealth();
    loadComfort();
    loadReminders();
    setInterval(loadHealth, 10000);
    setInterval(loadDevices, 15000);
    setInterval(loadComfort, 60000);  // 每分钟检查舒适度
  </script>
</body>
</html>
