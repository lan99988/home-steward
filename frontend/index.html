<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐌 Home Steward Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .device-card {
      transition: all 0.3s ease;
    }
    .device-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 25px -8px rgba(0,0,0,0.3);
    }
    .log-entry {
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .status-dot.off { background: #9ca3af; }
    .typing::after {
      content: '|';
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .scene-btn {
      background: white;
      border: 2px solid #e5e7eb;
      transition: all 0.2s;
    }
    .scene-btn:hover {
      border-color: #667eea;
      background: #eef2ff;
    }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <!-- 顶部栏 -->
    <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6 mb-6 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">🐌 Home Steward Agent</h1>
        <p class="text-sm text-gray-400 mt-1">AI 智能管家 · 正在悄悄让家变得更舒适</p>
      </div>
      <div class="flex items-center gap-4">
        <span id="statusBadge" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
          🟢 运行中
        </span>
        <a href="/api/docs" target="_blank" class="text-gray-400 hover:text-gray-600 text-sm underline">API 文档</a>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- 左栏：设备面板 -->
      <div class="lg:col-span-2 space-y-6">
        <!-- 设备卡片网格 -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-4">🏠 设备面板</h2>
          <div id="deviceGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="col-span-full text-center py-8 text-gray-400">
              <div class="animate-pulse">加载设备中...</div>
            </div>
          </div>
        </div>

        <!-- 场景快速按钮 -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-4">⚡ 快捷场景</h2>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <button onclick="executeScenario('离家模式')" class="scene-btn rounded-xl p-4 text-center">
              <div class="text-2xl mb-1">🚪</div>
              <div class="text-sm font-medium text-gray-700">离家模式</div>
              <div class="text-xs text-gray-400 mt-1">关闭所有设备</div>
            </button>
            <button onclick="executeScenario('回家模式')" class="scene-btn rounded-xl p-4 text-center">
              <div class="text-2xl mb-1">🏡</div>
              <div class="text-sm font-medium text-gray-700">回家模式</div>
              <div class="text-xs text-gray-400 mt-1">开客厅灯 40%</div>
            </button>
            <button onclick="executeScenario('睡眠模式')" class="scene-btn rounded-xl p-4 text-center">
              <div class="text-2xl mb-1">🌙</div>
              <div class="text-sm font-medium text-gray-700">睡眠模式</div>
              <div class="text-xs text-gray-400 mt-1">关灯·空调睡眠</div>
            </button>
            <button onclick="executeScenario('早安模式')" class="scene-btn rounded-xl p-4 text-center">
              <div class="text-2xl mb-1">☀️</div>
              <div class="text-sm font-medium text-gray-700">早安模式</div>
              <div class="text-xs text-gray-400 mt-1">渐亮·播报天气</div>
            </button>
          </div>
        </div>

        <!-- 语音指令输入 -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-4">🎙️ 控制指令</h2>
          <div class="flex gap-3">
            <input id="commandInput"
              type="text"
              placeholder="试试：打开客厅灯 / 空调调到26度 / 关闭卧室灯..."
              class="flex-1 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent"
              onkeydown="if(event.key==='Enter') sendCommand()" />
            <button onclick="sendCommand()"
              class="bg-gradient-to-r from-purple-500 to-indigo-600 text-white px-8 py-3 rounded-xl hover:from-purple-600 hover:to-indigo-700 font-medium shadow-lg">
              发送
            </button>
          </div>
          <div id="commandFeedback" class="mt-3 text-sm hidden"></div>
          <!-- 快捷指令 -->
          <div class="flex flex-wrap gap-2 mt-4">
            <span class="text-xs text-gray-400 mr-1 self-center">快速:</span>
            <button onclick="quickCmd('打开客厅灯')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">打开客厅灯</button>
            <button onclick="quickCmd('关闭客厅灯')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">关闭客厅灯</button>
            <button onclick="quickCmd('打开卧室灯')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">打开卧室灯</button>
            <button onclick="quickCmd('空调调到26度')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">空调26度</button>
            <button onclick="quickCmd('所有灯打开')" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg">所有灯打开</button>
          </div>
        </div>
      </div>

      <!-- 右栏：日志 + 系统状态 -->
      <div class="space-y-6">
        <!-- 系统健康 -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-4">🩺 系统健康</h2>
          <div id="healthPanel" class="space-y-3">
            <div class="animate-pulse text-gray-400 text-sm">加载中...</div>
          </div>
        </div>

        <!-- 操作日志 -->
        <div class="bg-white/90 backdrop-blur rounded-2xl shadow-xl p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-4">📋 操作日志</h2>
          <div id="logPanel" class="h-80 overflow-y-auto space-y-2 text-sm font-mono">
            <div class="text-gray-400 text-center py-8">还没有操作记录</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8000';

    // ===== 设备面板 =====
    async function loadDevices() {
      const res = await fetch(`${API}/api/devices/`);
      const data = await res.json();
      const grid = document.getElementById('deviceGrid');
      grid.innerHTML = '';
      for (const d of data.devices) {
        const statusRes = await fetch(`${API}/api/devices/${d.id}`);
        const statusData = await statusRes.json();
        grid.innerHTML += deviceCard(d, statusData.status);
      }
    }

    function deviceCard(device, status) {
      const isOn = status?.on;
      const icon = device.type === 'light' ? '💡' : device.type === 'ac' ? '❄️' : device.type === 'curtain' ? '🪟' : '🔌';
      const detail = status?.temperature ? `${status.temperature}°C` : status?.brightness ? `${status.brightness}%` : '';
      return `
        <div class="device-card bg-white rounded-xl border border-gray-100 p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-xl">${icon}</span>
              <div>
                <div class="font-medium text-gray-800">${device.name}</div>
                <div class="text-xs text-gray-400">${device.id}</div>
              </div>
            </div>
            <span class="status-dot ${isOn ? 'on' : 'off'}"></span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-sm ${isOn ? 'text-green-600 font-medium' : 'text-gray-400'}">
              ${isOn ? '已开启' : '已关闭'} ${detail ? '· ' + detail : ''}
            </span>
            <button onclick="quickCmd('${isOn ? '关闭' : '打开'}${device.name}')"
              class="text-xs px-3 py-1.5 rounded-lg ${isOn ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-50 text-green-600 hover:bg-green-100'}">
              ${isOn ? '关闭' : '打开'}
            </button>
          </div>
        </div>`;
    }

    // ===== 命令发送 =====
    async function sendCommand() {
      const input = document.getElementById('commandInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      await executeCommand(text);
    }

    function quickCmd(text) {
      document.getElementById('commandInput').value = text;
      sendCommand();
    }

    async function executeCommand(text) {
      const feedback = document.getElementById('commandFeedback');
      feedback.className = 'mt-3 text-sm text-gray-500';
      feedback.innerHTML = '⏳ 处理中...';
      feedback.classList.remove('hidden');

      const res = await fetch(`${API}/api/devices/command`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const result = await res.json();

      const isSuccess = result.success;
      feedback.className = `mt-3 text-sm ${isSuccess ? 'text-green-600' : 'text-red-500'}`;
      feedback.innerHTML = `${isSuccess ? '✅' : '❌'} ${result.message}`;

      addLog(text, result);
      loadDevices();
      loadHealth();
    }

    // ===== 场景执行 =====
    async function executeScenario(name) {
      document.getElementById('commandFeedback').className = 'mt-3 text-sm text-gray-500';
      document.getElementById('commandFeedback').innerHTML = `⏳ 执行 ${name}...`;
      document.getElementById('commandFeedback').classList.remove('hidden');

      const commands = {
        '离家模式': ['关闭客厅灯', '关闭卧室灯', '关闭厨房灯'],
        '回家模式': ['打开客厅灯'],
        '睡眠模式': ['关闭客厅灯', '关闭卧室灯'],
        '早安模式': ['打开卧室灯'],
      };
      for (const cmd of commands[name] || []) {
        addLog(`[${name}] ${cmd}`, { success: true, message: '场景步骤' });
        await executeCommand(cmd);
      }
      document.getElementById('commandFeedback').innerHTML = `✅ ${name} 执行完成`;
    }

    // ===== 操作日志 =====
    function addLog(text, result) {
      const panel = document.getElementById('logPanel');
      const entry = document.createElement('div');
      entry.className = 'log-entry p-2 rounded-lg bg-gray-50';
      const time = new Date().toLocaleTimeString();
      const icon = result.success ? '✅' : '❌';
      entry.innerHTML = `<span class="text-gray-400">${time}</span> ${icon} ${text}<br><span class="text-xs text-gray-400">→ ${result.message}</span>`;
      panel.prepend(entry);
      if (panel.children.length > 50) panel.lastChild.remove();
    }

    // ===== 健康面板 =====
    async function loadHealth() {
      try {
        const res = await fetch(`${API}/api/health/detailed`);
        const h = await res.json();
        const panel = document.getElementById('healthPanel');
        panel.innerHTML = '';
        const items = [
          { label: '后端服务', status: h.backend?.status, detail: h.backend?.uptime },
          { label: 'MQTT 消息', status: h.mqtt?.status, detail: `${h.mqtt?.messages || 0} 条` },
          { label: 'AI 模型', status: h.llm?.status, detail: `${h.llm?.model || '未部署'} · ${h.llm?.latency || '-'}` },
          { label: '记忆系统', status: h.memory?.status, detail: `${h.memory?.count || 0} 条` },
          { label: '磁盘', status: 'normal', detail: `${h.disk?.used || '-'} / ${h.disk?.total || '-'}` },
        ];
        for (const item of items) {
          const color = item.status === 'running' || item.status === 'normal' || item.status === 'connected'
            ? 'bg-green-500' : 'bg-red-500';
          panel.innerHTML += `
            <div class="flex items-center justify-between py-1">
              <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full ${color}"></span>
                <span class="text-sm text-gray-600">${item.label}</span>
              </div>
              <span class="text-xs text-gray-400">${item.detail}</span>
            </div>`;
        }
      } catch {
        document.getElementById('healthPanel').innerHTML = '<div class="text-sm text-red-400">⚠️ 无法获取系统状态</div>';
      }
    }

    // ===== 定时刷新 =====
    loadDevices();
    loadHealth();
    setInterval(loadHealth, 5000);
  </script>
</body>
</html>
