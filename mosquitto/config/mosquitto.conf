# Mosquitto MQTT Broker 配置
# Home Steward Agent

# 监听端口
listener 1883

# WebSocket 支持（用于浏览器端 MQTT）
listener 9001
protocol websockets

# 允许匿名连接（内网环境）
allow_anonymous true

# 持久化
persistence true
persistence_location /mosquitto/data/

# 日志
log_dest file /mosquitto/log/mosquitto.log
log_type all
connection_messages true
log_timestamp true

# 安全设置（内网环境）
max_connections 100
autosave_interval 1800
